<!DOCTYPE html>
<html>
<head>
    <title>Bootstrap Accordion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">
    <div class="accordion" id="myAccordion">

        <div class="accordion-item">
            <h2 class="accordion-header">
                <button class="accordion-button" data-bs-toggle="collapse" data-bs-target="#one">
                    Question 1
                </button>
            </h2>

            <div id="one" class="accordion-collapse collapse show" data-bs-parent="#myAccordion">
                <div class="accordion-body">
                    This is the answer for question 1.
                </div>
            </div>
        </div>

        <div class="accordion-item">
            <h2 class="accordion-header">
                <button class="accordion-button collapsed" data-bs-toggle="collapse" data-bs-target="#two">
                    Question 2
                </button>
            </h2>

            <div id="two" class="accordion-collapse collapse" data-bs-parent="#myAccordion">
                <div class="accordion-body">
                    This is the answer for question 2.
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
