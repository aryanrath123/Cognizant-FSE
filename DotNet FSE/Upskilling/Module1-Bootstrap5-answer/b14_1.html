<!DOCTYPE html>
<html>
<head>
    <title>Display Utilities</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">
    <div class="d-none d-md-block bg-primary text-white p-3">
        Visible on medium screens and above
    </div>

    <div class="d-none d-lg-flex bg-success text-white p-3 mt-3">
        Visible as flex on large screens
    </div>
</div>

</body>
</html>
