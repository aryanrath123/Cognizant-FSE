<!DOCTYPE html>
<html>
<head>
    <title>Four Column Layout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">
    <div class="row">
        <div class="col-sm-3">
            <p>Column 1</p>
        </div>

        <div class="col-sm-3">
            <p>Column 2</p>
        </div>

        <div class="col-sm-3">
            <p>Column 3</p>
        </div>

        <div class="col-sm-3">
            <p>Column 4</p>
        </div>
    </div>
</div>

</body>
</html>
