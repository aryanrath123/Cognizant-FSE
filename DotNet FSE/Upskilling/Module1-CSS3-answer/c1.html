<!DOCTYPE html>
<html>
<head>
    <title>CSS Exercise</title>

    <style>
        /* Body styles */
        body {
            background-color: lightgray;
        }

        /* Header styles */
        h2 {
            color: blue;
            font-size: 25px;
        }

        /* Paragraph styles */
        p {
            color: black;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <h1 style="color: red;">Welcome to CSS</h1>

    <h2>Learning CSS Styles</h2>

    <p>This page shows different CSS styles.</p>

</body>
</html>
