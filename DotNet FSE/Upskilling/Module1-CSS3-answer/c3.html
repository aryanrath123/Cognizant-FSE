<!DOCTYPE html>
<html>
<head>
    <title>CSS Selectors</title>

    <style>
        * {
            margin: 0;
            padding: 0;
        }

        h2 {
            color: blue;
            margin: 10px;
        }

        #mainHeader {
            background-color: darkblue;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .eventCard {
            background-color: lightgray;
            margin: 10px;
            padding: 15px;
        }

        h3, p {
            font-family: Arial;
            color: #333;
        }
    </style>
</head>
<body>

    <div id="mainHeader">
        <h1>Community Events</h1>
    </div>

    <h2>Upcoming Events</h2>

    <div class="eventCard">
        <h3>Music Event</h3>
        <p>Music event will be held on Sunday.</p>
    </div>

    <div class="eventCard">
        <h3>Sports Event</h3>
        <p>Sports event will be held on Monday.</p>
    </div>

</body>
</html>
