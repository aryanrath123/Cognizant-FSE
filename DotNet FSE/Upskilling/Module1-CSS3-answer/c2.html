<!DOCTYPE html>
<html>
<head>
    <title>CSS Syntax and Comments</title>

    <style>
        /* Style for page body */
        body {
            font-family: Arial;
            background-color: lightgray;
        }

        /* Style for main heading */
        h1 {
            color: darkblue;
            text-align: center;
        }

        /* Style for paragraph */
        p {
            font-size: 18px;
            color: black;
        }

        /* Style for main CTA button */
        .cta-button {
            background-color: #007BFF;
            color: white;
            padding: 10px;
            border: none;
        }
    </style>
</head>
<body>

    <h1>CSS Styling</h1>

    <p>This page shows properly formatted CSS rules.</p>

    <button class="cta-button">Click Me</button>

</body>
</html>
