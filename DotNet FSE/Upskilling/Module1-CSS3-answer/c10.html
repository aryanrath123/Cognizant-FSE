<!DOCTYPE html>
<html>
<head>
    <title>Responsive Web Design</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        nav {
            display: flex;
            background-color: darkblue;
            padding: 15px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 10px;
        }

        .content {
            width: 80%;
            min-height: 70vh;
            margin: auto;
            text-align: center;
        }

        img {
            width: 40%;
        }

        h1 {
            font-size: 3vw;
        }

        @media screen and (max-width: 768px) {
            nav {
                flex-direction: column;
            }

            nav a {
                margin: 5px;
            }

            img {
                width: 70%;
            }

            h1 {
                font-size: 7vw;
            }

            p {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#">Home</a>
        <a href="#">Events</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>

    <div class="content">
        <h1>Community Portal</h1>

        <img src="https://via.placeholder.com/500" alt="Community">

        <p>Welcome to the community event portal.</p>
    </div>

</body>
</html>
