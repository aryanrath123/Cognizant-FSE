<!DOCTYPE html>
<html>
<head>
    <title>DevTools Testing</title>
    <style>
        body {
            font-family: Arial;
        }

        .container {
            width: 80%;
            margin: auto;
        }

        .box {
            background-color: lightblue;
            padding: 20px;
            margin: 10px;
        }

        @media screen and (max-width: 768px) {
            .container {
                width: 95%;
            }

            .box {
                padding: 10px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Responsive Testing</h1>

        <div class="box">
            <p>This page is used to test responsive layout using Chrome DevTools.</p>
        </div>
    </div>

</body>
</html>
