<!DOCTYPE html>
<html>
<head>
    <title>CSS Typography</title>

    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Roboto', sans-serif;
        }

        h1 {
            font-size: 36px;
            font-weight: bold;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        h2 {
            font-size: 28px;
            font-style: italic;
            font-weight: 600;
        }

        .description {
            font-size: 18px;
            text-align: justify;
            line-height: 1.8;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <h1>Community Portal</h1>

    <h2>Upcoming Events</h2>

    <p class="description">
        Welcome to our community portal. Here you can find information about upcoming events and activities in the city.
    </p>

</body>
</html>
