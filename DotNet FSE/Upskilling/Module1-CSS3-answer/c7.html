<!DOCTYPE html>
<html>
<head>
    <title>Table Styling</title>

    <style>
        table {
            width: 70%;
            border-collapse: collapse;
            text-align: center;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
        }

        th {
            background-color: #007BFF;
            color: white;
        }

        tr:nth-child(even) {
            background-color: lightgray;
        }
    </style>
</head>
<body>

    <h2>Events Admin Table</h2>

    <table>
        <tr>
            <th>Event Name</th>
            <th>Date</th>
            <th>Location</th>
        </tr>

        <tr>
            <td>Music Event</td>
            <td>10 July</td>
            <td>City Hall</td>
        </tr>

        <tr>
            <td>Sports Event</td>
            <td>15 July</td>
            <td>Stadium</td>
        </tr>

        <tr>
            <td>Food Festival</td>
            <td>20 July</td>
            <td>City Park</td>
        </tr>
    </table>

</body>
</html>
