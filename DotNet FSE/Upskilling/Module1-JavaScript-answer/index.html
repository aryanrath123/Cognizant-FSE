<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Community Event Portal</title>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f6f8;
        }

        header {
            background: #1565c0;
            color: white;
            padding: 25px;
            text-align: center;
        }

        .controls {
            text-align: center;
            padding: 20px;
        }

        select, input {
            padding: 10px;
            margin: 5px;
        }

        #eventContainer {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .event-card {
            background: white;
            width: 250px;
            margin: 15px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 8px gray;
        }

        button {
            background: #1565c0;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
        }

        button:hover {
            background: #0d47a1;
        }

        form {
            width: 400px;
            max-width: 90%;
            margin: 30px auto;
            padding: 25px;
            background: white;
            box-shadow: 0 0 8px gray;
        }

        form input, form select {
            width: 90%;
        }

        .error {
            color: red;
        }

        #spinner {
            display: none;
            text-align: center;
            font-weight: bold;
        }

        #message {
            text-align: center;
            font-weight: bold;
        }

        footer {
            background: #1565c0;
            color: white;
            padding: 15px;
            text-align: center;
            margin-top: 30px;
        }
    </style>
</head>

<body>

<header>
    <h1>Local Community Event Portal</h1>
    <p>Explore and register for upcoming community events</p>
</header>

<div class="controls">

    <select id="categoryFilter" onchange="filterCategory()">
        <option value="All">All Events</option>
        <option value="Music">Music</option>
        <option value="Workshop">Workshop</option>
        <option value="Sports">Sports</option>
    </select>

    <input type="text"
           id="search"
           placeholder="Search event"
           onkeydown="searchEvent()">

</div>

<div id="spinner">Loading Events...</div>

<div id="eventContainer"></div>

<h2 style="text-align:center;">Event Registration</h2>

<form id="registrationForm">

    <input type="text"
           name="username"
           placeholder="Enter your name">

    <p id="nameError" class="error"></p>

    <input type="email"
           name="email"
           placeholder="Enter your email">

    <p id="emailError" class="error"></p>

    <select name="event">
        <option value="">Select Event</option>
        <option value="Music Festival">Music Festival</option>
        <option value="Baking">Baking Workshop</option>
        <option value="Football">Football Tournament</option>
    </select>

    <p id="eventError" class="error"></p>

    <button type="submit" id="registerBtn">Register</button>

</form>

<p id="message"></p>

<footer>
    <p>2026 Local Community Event Portal</p>
    <p>Framework Benefit: React or Vue provides reusable components and faster UI updates.</p>
</footer>

<script src="main.js"></script>

</body>
</html>
